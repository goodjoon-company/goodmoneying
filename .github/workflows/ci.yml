name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
          cache: npm

      - name: Python dependencies
        run: uv sync --frozen

      - name: Node dependencies
        run: npm ci

      - name: Playwright dependencies
        run: npx playwright install --with-deps chromium

      - name: Python lint
        run: uv run ruff check .

      - name: Python type check
        run: uv run mypy apps/api apps/worker apps/upbit_gateway packages/shared tests

      - name: Python tests
        run: uv run pytest

      - name: Web tests
        run: npm test

      - name: Web build
        run: npm run build

      - name: DB migration E2E
        run: tests/e2e/run_dbmate_migration_e2e.sh

      - name: Browser E2E
        run: npm run e2e

      - name: Docker build api
        run: docker build -f apps/api/Dockerfile -t goodmoneying-api:ci .

      - name: Docker build worker
        run: docker build -f apps/worker/Dockerfile -t goodmoneying-worker:ci .

      - name: Docker build upbit gateway
        run: docker build -f apps/upbit_gateway/Dockerfile -t goodmoneying-upbit-gateway:ci .

      - name: Docker build web
        run: docker build -f apps/web/Dockerfile -t goodmoneying-web:ci .

      - name: Docker build migrations
        run: docker build -f apps/migrations/Dockerfile -t goodmoneying-migrations:ci .
