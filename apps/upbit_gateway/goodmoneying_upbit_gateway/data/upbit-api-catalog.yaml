    method: GET
    path: /v1/orders/open
    parameters: &order_list_parameters
      - {name: market, location: query, type: string, required: false}
      - {name: state, location: query, type: string, required: false}
      - {name: "states[]", location: query, type: array, items: string, required: false}
      - {name: page, location: query, type: integer, required: false, default: 1, minimum: 1, step: 1, unit: 페이지}
      - {name: limit, location: query, type: integer, required: false, default: 100, maximum: 100, step: 1, unit: 개}
      - {name: order_by, location: query, type: string, required: false, enum: [asc, desc]}
    mutually_exclusive: [[state, "states[]"]]
    rate_limit_group: default
    safety: read
    source_url: https://docs.upbit.com/kr/reference/list-open-orders.md
  - endpoint_id: rest.list-closed-orders
    title: 종료 주문 목록 조회
    category: exchange
    functional_group: order
    method: GET
    path: /v1/orders/closed
    parameters:
      - {name: market, location: query, type: string, required: false}
      - {name: state, location: query, type: string, required: false}
      - {name: "states[]", location: query, type: array, items: string, required: false}
      - {name: start_time, location: query, type: string, required: false, format: date-time, timezone: Asia/Seoul, step: 1, range_with: end_time, range_max_seconds: 604800}
      - {name: end_time, location: query, type: string, required: false, format: date-time, timezone: Asia/Seoul, step: 1, range_with: start_time, range_max_seconds: 604800}
      - {name: limit, location: query, type: integer, required: false, default: 100, maximum: 1000, step: 1, unit: 개}
      - {name: order_by, location: query, type: string, required: false, enum: [asc, desc]}
    mutually_exclusive: [[state, "states[]"]]
    rate_limit_group: default
    safety: read
    source_url: https://docs.upbit.com/kr/reference/list-closed-orders.md
  - endpoint_id: rest.cancel-order
    title: 개별 주문 취소 접수
    category: exchange
    functional_group: order
    method: DELETE
    path: /v1/order
    parameters:
      - {name: uuid, location: query, type: string, required: false}
      - {name: identifier, location: query, type: string, required: false, max_length: 64}
    any_of_required: [[uuid], [identifier]]
    rate_limit_group: default
    safety: blocked
    source_url: https://docs.upbit.com/kr/reference/cancel-order.md
  - endpoint_id: rest.cancel-orders-by-ids
    title: id로 주문 목록 취소 접수
    category: exchange
    functional_group: order
    method: DELETE
    path: /v1/orders/uuids
    parameters:
      - {name: "uuids[]", location: query, type: array, items: string, required: false, max_items: 20, unique_items: true}
      - {name: "identifiers[]", location: query, type: array, items: string, required: false, max_items: 20, unique_items: true}
    any_of_required: [["uuids[]"], ["identifiers[]"]]
    mutually_exclusive: [["uuids[]", "identifiers[]"]]
    rate_limit_group: default
    safety: blocked
    source_url: https://docs.upbit.com/kr/reference/cancel-orders-by-ids.md
  - endpoint_id: rest.batch-cancel-orders
    title: 주문 일괄 취소 접수
    category: exchange
    functional_group: order
    method: DELETE
    path: /v1/orders/open
    parameters:
      - {name: quote_currencies, location: query, type: string, required: false}
      - {name: cancel_side, location: query, type: string, required: false, enum: [all, ask, bid]}
      - {name: count, location: query, type: integer, required: false, default: 20, maximum: 300, step: 1, unit: 개}
      - {name: order_by, location: query, type: string, required: false, enum: [asc, desc]}
      - {name: pairs, location: query, type: string, required: false, format: csv, max_items: 20, unique_items: true}
      - {name: exclude_pairs, location: query, type: string, required: false, format: csv, max_items: 20, unique_items: true}
    rate_limit_group: order-cancel-all
    safety: blocked
    source_url: https://docs.upbit.com/kr/reference/batch-cancel-orders.md
  - endpoint_id: rest.cancel-and-new-order
    title: 취소 후 재주문
    category: exchange
    functional_group: order
    method: POST
    path: /v1/orders/cancel_and_new
    parameters:
      - {name: prev_order_uuid, location: body, type: string, required: false}
      - {name: prev_order_identifier, location: body, type: string, required: false, max_length: 64}
      - {name: new_ord_type, location: body, type: string, required: true, enum: [limit, price, market, best]}
      - {name: new_volume, location: body, type: string, required: false}
      - {name: new_price, location: body, type: string, required: false}
      - {name: new_identifier, location: body, type: string, required: false, max_length: 64}
      - {name: new_time_in_force, location: body, type: string, required: false, enum: [ioc, fok, post_only]}
      - {name: new_smp_type, location: body, type: string, required: false, enum: [cancel_maker, cancel_taker, reduce]}
    forbidden_value_combinations:
      - {when: {new_time_in_force: post_only}, forbid: [new_smp_type]}
    rate_limit_group: order
    safety: blocked
    source_url: https://docs.upbit.com/kr/reference/cancel-and-new-order.md
  - endpoint_id: rest.available-withdrawal-information
    title: 출금 가능 정보 조회
    category: exchange
    functional_group: withdrawal
    method: GET
    path: /v1/withdraws/chance
