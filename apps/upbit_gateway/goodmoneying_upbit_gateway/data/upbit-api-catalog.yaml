    type: orderbook
    visibility: public
    parameters:
      - {name: codes, type: array, items: string, required: true}
      - {name: level, type: number, required: false}
      - {name: is_only_snapshot, type: boolean, required: false, default: false}
      - {name: is_only_realtime, type: boolean, required: false, default: false}
    safety: read
    source_url: https://docs.upbit.com/kr/reference/websocket-orderbook.md
