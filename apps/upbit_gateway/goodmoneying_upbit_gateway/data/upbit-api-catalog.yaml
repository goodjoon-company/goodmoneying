catalog_version: 1.6.3
verified_at: 2026-07-16
official_baseline: https://docs.upbit.com/kr/llms.txt
rest_base_url: https://api.upbit.com
websocket_urls:
  public: wss://api.upbit.com/websocket/v1
  private: wss://api.upbit.com/websocket/v1/private
safety_levels:
  read: 조회 전용
  test: 실제 주문을 생성하지 않는 공식 주문 생성 테스트
  blocked: 로컬 요청 미리보기만 허용하며 업비트 상향 전송 금지
rest_inventory:
  active_count: 50
  deprecated_count: 1
  total_count: 51
rate_limits:
  market: {scope: ip, requests: 10, seconds: 1}
  candle: {scope: ip, requests: 10, seconds: 1}
  trade: {scope: ip, requests: 10, seconds: 1}
  ticker: {scope: ip, requests: 10, seconds: 1}
  orderbook: {scope: ip, requests: 10, seconds: 1}
  default: {scope: pocket, requests: 30, seconds: 1}
  order: {scope: pocket, requests: 8, seconds: 1}
  order-test: {scope: pocket, requests: 8, seconds: 1}
  order-cancel-all: {scope: pocket, requests: 1, seconds: 2}
  websocket-connect: {scope: ip_or_pocket, requests: 5, seconds: 1}
  websocket-message: {scope: connection, requests: 5, seconds: 1, requests_per_minute: 100}
origin_limit:
  trigger: {header: Origin, condition: present}
  applies_to: [quotation-rest, public-websocket]
  group: origin
  limit: {requests: 1, seconds: 10}

rest_endpoints:
  - endpoint_id: rest.list-trading-pairs
    title: 페어 목록 조회
    category: quotation
    functional_group: pair
    method: GET
    path: /v1/market/all
    parameters: [{name: is_details, location: query, type: boolean, required: false}]
    required_response_fields: [market, korean_name, english_name, market_event]
    market_event_fields: [warning, caution]
    listed_pair_state: active
    rate_limit_group: market
    safety: read
    source_url: https://docs.upbit.com/kr/reference/list-trading-pairs.md
  - endpoint_id: rest.list-candles-seconds
    title: 초 캔들 조회
    category: quotation
    functional_group: candle
    method: GET
    path: /v1/candles/seconds
    parameters: &candle_parameters
      - {name: market, location: query, type: string, required: true}
      - {name: to, location: query, type: string, required: false, format: date-time, timezone: Asia/Seoul, step: 1}
      - {name: count, location: query, type: integer, required: false, default: 1, minimum: 1, maximum: 200, step: 1, unit: 개}
    rate_limit_group: candle
    safety: read
    source_url: https://docs.upbit.com/kr/reference/list-candles-seconds.md
  - endpoint_id: rest.list-candles-minutes
    title: 분 캔들 조회
    category: quotation
    functional_group: candle
    method: GET
    path: /v1/candles/minutes/{unit}
    parameters:
      - {name: unit, location: path, type: integer, required: true, enum: [1, 3, 5, 10, 15, 30, 60, 240]}
      - {name: market, location: query, type: string, required: true}
      - {name: to, location: query, type: string, required: false, format: date-time, timezone: Asia/Seoul, step: 1}
      - {name: count, location: query, type: integer, required: false, default: 1, minimum: 1, maximum: 200, step: 1, unit: 개}
    rate_limit_group: candle
    safety: read
    source_url: https://docs.upbit.com/kr/reference/list-candles-minutes.md
  - endpoint_id: rest.list-candles-days
    title: 일 캔들 조회
    category: quotation
    functional_group: candle
    method: GET
    path: /v1/candles/days
    parameters:
      - {name: market, location: query, type: string, required: true}
      - {name: to, location: query, type: string, required: false, format: date-time, timezone: Asia/Seoul, step: 1}
      - {name: count, location: query, type: integer, required: false, default: 1, minimum: 1, maximum: 200, step: 1, unit: 개}
      - {name: converting_price_unit, location: query, type: string, required: false}
    rate_limit_group: candle
    safety: read
    source_url: https://docs.upbit.com/kr/reference/list-candles-days.md
  - endpoint_id: rest.list-candles-weeks
    title: 주 캔들 조회
    category: quotation
    functional_group: candle
    method: GET
    path: /v1/candles/weeks
    parameters: *candle_parameters
    rate_limit_group: candle
    safety: read
    source_url: https://docs.upbit.com/kr/reference/list-candles-weeks.md
  - endpoint_id: rest.list-candles-months
    title: 월 캔들 조회
    category: quotation
    functional_group: candle
    method: GET
    path: /v1/candles/months
    parameters: *candle_parameters
    rate_limit_group: candle
    safety: read
    source_url: https://docs.upbit.com/kr/reference/list-candles-months.md
  - endpoint_id: rest.list-candles-years
    title: 연 캔들 조회
    category: quotation
    functional_group: candle
    method: GET
    path: /v1/candles/years
    parameters: *candle_parameters
    rate_limit_group: candle
    safety: read
    source_url: https://docs.upbit.com/kr/reference/list-candles-years.md
  - endpoint_id: rest.list-pair-trades
    title: 페어 체결 이력 조회
    category: quotation
    functional_group: trade
    method: GET
    path: /v1/trades/ticks
    parameters:
      - {name: market, location: query, type: string, required: true}
      - {name: to, location: query, type: string, required: false, format: time, timezone: UTC, step: 1}
      - {name: count, location: query, type: integer, required: false, default: 1, minimum: 1, maximum: 500, step: 1, unit: 개}
      - {name: cursor, location: query, type: string, required: false}
      - {name: days_ago, location: query, type: integer, required: false, default: 1, minimum: 1, maximum: 7, step: 1, unit: 일}
    rate_limit_group: trade
    safety: read
    source_url: https://docs.upbit.com/kr/reference/list-pair-trades.md
  - endpoint_id: rest.list-tickers
    title: 페어 단위 현재가 조회
    category: quotation
    functional_group: ticker
    method: GET
    path: /v1/ticker
    parameters: [{name: markets, location: query, type: string, required: true}]
    rate_limit_group: ticker
    safety: read
    source_url: https://docs.upbit.com/kr/reference/list-tickers.md
  - endpoint_id: rest.list-quote-tickers
    title: 마켓 단위 현재가 조회
    category: quotation
    functional_group: ticker
    method: GET
    path: /v1/ticker/all
    parameters: [{name: quote_currencies, location: query, type: string, required: true}]
    rate_limit_group: ticker
    safety: read
    source_url: https://docs.upbit.com/kr/reference/list-quote-tickers.md
  - endpoint_id: rest.list-orderbooks
    title: 호가 조회
    category: quotation
    functional_group: orderbook
    method: GET
    path: /v1/orderbook
    parameters:
      - {name: markets, location: query, type: string, required: true}
      - {name: level, location: query, type: string, required: false, format: decimal-string, default: "0", dynamic_constraint_source: rest.list-orderbook-instruments}
      - {name: count, location: query, type: integer, required: false, default: 30, minimum: 1, maximum: 30, step: 1, unit: 호가 쌍}
    rate_limit_group: orderbook
    safety: read
    source_url: https://docs.upbit.com/kr/reference/list-orderbooks.md
  - endpoint_id: rest.list-orderbook-instruments
    title: 호가 정책 조회
    category: quotation
    functional_group: orderbook
    method: GET
    path: /v1/orderbook/instruments
    parameters: [{name: markets, location: query, type: string, required: true}]
    rate_limit_group: orderbook
    safety: read
    source_url: https://docs.upbit.com/kr/reference/list-orderbook-instruments.md
  - endpoint_id: rest.list-orderbook-levels
    title: 호가 모아보기 단위 조회
    category: quotation
    functional_group: orderbook
    deprecated: true
    method: GET
    path: /v1/orderbook/supported_levels
    parameters: [{name: markets, location: query, type: string, required: true}]
    rate_limit_group: orderbook
    safety: read
    source_url: https://docs.upbit.com/kr/reference/list-orderbook-levels.md
  - endpoint_id: rest.get-pocket-information
    title: 포켓 정보 조회
    category: exchange
    functional_group: pocket
    method: GET
    path: /v1/pockets
    parameters: []
    rate_limit_group: default
    safety: read
    source_url: https://docs.upbit.com/kr/reference/get-pocket-information.md
  - endpoint_id: rest.get-pocket-api-keys
    title: 포켓별 API Key 목록 조회
    category: exchange
    functional_group: pocket
    method: GET
    path: /v1/pockets/api_keys
    parameters:
      - {name: "uuids[]", location: query, type: array, items: string, required: false}
      - {name: include_expired, location: query, type: boolean, required: false}
    rate_limit_group: default
    safety: read
    source_url: https://docs.upbit.com/kr/reference/get-pocket-api-keys.md
  - endpoint_id: rest.get-sub-pocket-balance
    title: 서브포켓 잔고 조회
    category: exchange
    functional_group: pocket
    method: GET
    path: /v1/pockets/assets
    parameters: [{name: uuid, location: query, type: string, required: true}]
    rate_limit_group: default
    safety: read
    source_url: https://docs.upbit.com/kr/reference/get-sub-pocket-balance.md
  - endpoint_id: rest.post-universal-transfer
    title: 메인포켓 자산 이전
    category: exchange
    functional_group: pocket
    method: POST
    path: /v1/pockets/universal_transfers
    parameters:
      - {name: from, location: body, type: string, required: false}
      - {name: to, location: body, type: string, required: true}
      - {name: currency, location: body, type: string, required: true}
      - {name: amount, location: body, type: string, required: true, format: decimal-string}
      - {name: identifier, location: body, type: string, required: false}
    rate_limit_group: default
    safety: blocked
    source_url: https://docs.upbit.com/kr/reference/post-universal-transfer.md
  - endpoint_id: rest.get-universal-transfer
    title: 메인포켓 자산 이전 목록 조회
    category: exchange
    functional_group: pocket
    method: GET
    path: /v1/pockets/universal_transfers
    parameters: &transfer_list_parameters
      - {name: from, location: query, type: string, required: false}
      - {name: to, location: query, type: string, required: false}
      - {name: "states[]", location: query, type: array, items: string, required: false}
      - {name: "uuids[]", location: query, type: array, items: string, required: false, max_items: 20, unique_items: true}
      - {name: "identifiers[]", location: query, type: array, items: string, required: false, max_items: 20, unique_items: true}
      - {name: start_time, location: query, type: string, required: false, format: date-time, timezone: Asia/Seoul, step: 1, range_with: end_time, range_max_seconds: 604800}
      - {name: end_time, location: query, type: string, required: false, format: date-time, timezone: Asia/Seoul, step: 1, range_with: start_time, range_max_seconds: 604800}
      - {name: currency, location: query, type: string, required: false}
      - {name: limit, location: query, type: string, required: false, format: integer-string, default: "20", maximum: 100, step: 1, unit: 개}
      - {name: order_by, location: query, type: string, required: false, enum: [asc, desc]}
    rate_limit_group: default
    safety: read
    source_url: https://docs.upbit.com/kr/reference/get-universal-transfer.md
  - endpoint_id: rest.post-transfer
    title: 서브포켓 자산 이전
    category: exchange
    functional_group: pocket
    method: POST
    path: /v1/pockets/transfers
    parameters:
      - {name: to, location: body, type: string, required: true}
      - {name: currency, location: body, type: string, required: true}
      - {name: amount, location: body, type: string, required: true, format: decimal-string}
      - {name: identifier, location: body, type: string, required: false}
    rate_limit_group: default
    safety: blocked
    source_url: https://docs.upbit.com/kr/reference/post-transfer.md
  - endpoint_id: rest.get-transfer
    title: 서브포켓 자산 이전 목록 조회
    category: exchange
    functional_group: pocket
    method: GET
    path: /v1/pockets/transfers
    parameters:
      - {name: direction, location: query, type: string, required: false, enum: [in, out]}
      - {name: to, location: query, type: string, required: false}
      - {name: "states[]", location: query, type: array, items: string, required: false}
      - {name: "uuids[]", location: query, type: array, items: string, required: false, max_items: 20, unique_items: true}
      - {name: "identifiers[]", location: query, type: array, items: string, required: false, max_items: 20, unique_items: true}
      - {name: start_time, location: query, type: string, required: false, format: date-time, timezone: Asia/Seoul, step: 1, range_with: end_time, range_max_seconds: 604800}
      - {name: end_time, location: query, type: string, required: false, format: date-time, timezone: Asia/Seoul, step: 1, range_with: start_time, range_max_seconds: 604800}
      - {name: currency, location: query, type: string, required: false}
      - {name: limit, location: query, type: string, required: false, format: integer-string, default: "20", maximum: 100, step: 1, unit: 개}
      - {name: order_by, location: query, type: string, required: false, enum: [asc, desc]}
    rate_limit_group: default
    safety: read
    source_url: https://docs.upbit.com/kr/reference/get-transfer.md
  - endpoint_id: rest.get-balance
    title: 포켓 잔고 조회
    category: exchange
    functional_group: asset
    method: GET
    path: /v1/accounts
    parameters: []
    rate_limit_group: default
    safety: read
    source_url: https://docs.upbit.com/kr/reference/get-balance.md
  - endpoint_id: rest.available-order-information
    title: 페어별 주문 가능 정보 조회
    category: exchange
    functional_group: order
    method: GET
    path: /v1/orders/chance
    parameters: [{name: market, location: query, type: string, required: true}]
    rate_limit_group: default
    safety: read
    source_url: https://docs.upbit.com/kr/reference/available-order-information.md
  - endpoint_id: rest.new-order
    title: 주문 생성
    category: exchange
    functional_group: order
    method: POST
    path: /v1/orders
    parameters: &order_parameters
      - {name: market, location: body, type: string, required: true}
      - {name: side, location: body, type: string, required: true, enum: [ask, bid]}
      - {name: volume, location: body, type: string, required: false, format: decimal-string, dynamic_constraint_source: rest.available-order-information}
      - {name: price, location: body, type: string, required: false, format: decimal-string, dynamic_constraint_source: rest.list-orderbook-instruments}
      - {name: ord_type, location: body, type: string, required: false, enum: [limit, price, market, best]}
      - {name: identifier, location: body, type: string, required: false, max_length: 64}
      - {name: time_in_force, location: body, type: string, required: false, enum: [ioc, fok, post_only]}
      - {name: smp_type, location: body, type: string, required: false, enum: [cancel_maker, cancel_taker, reduce]}
    forbidden_value_combinations: &order_forbidden_value_combinations
      - {when: {time_in_force: post_only}, forbid: [smp_type]}
    rate_limit_group: order
    safety: blocked
    source_url: https://docs.upbit.com/kr/reference/new-order.md
  - endpoint_id: rest.order-test
    title: 주문 생성 테스트
    category: exchange
    functional_group: order
    method: POST
    path: /v1/orders/test
    parameters: *order_parameters
    forbidden_value_combinations: *order_forbidden_value_combinations
    rate_limit_group: order-test
    safety: test
    source_url: https://docs.upbit.com/kr/reference/order-test.md
  - endpoint_id: rest.get-order
    title: 개별 주문 조회
    category: exchange
    functional_group: order
    method: GET
    path: /v1/order
    parameters:
      - {name: uuid, location: query, type: string, required: false}
      - {name: identifier, location: query, type: string, required: false, max_length: 64}
    any_of_required: [[uuid], [identifier]]
    rate_limit_group: default
    safety: read
    source_url: https://docs.upbit.com/kr/reference/get-order.md
  - endpoint_id: rest.list-orders-by-ids
    title: id로 주문 목록 조회
    category: exchange
    functional_group: order
    method: GET
    path: /v1/orders/uuids
    parameters:
      - {name: market, location: query, type: string, required: false}
      - {name: "uuids[]", location: query, type: array, items: string, required: false, max_items: 100, unique_items: true}
      - {name: "identifiers[]", location: query, type: array, items: string, required: false, max_items: 100, unique_items: true}
      - {name: order_by, location: query, type: string, required: false, enum: [asc, desc]}
    any_of_required: [["uuids[]"], ["identifiers[]"]]
    mutually_exclusive: [["uuids[]", "identifiers[]"]]
    rate_limit_group: default
    safety: read
    source_url: https://docs.upbit.com/kr/reference/list-orders-by-ids.md
