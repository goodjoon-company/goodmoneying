services:
  postgres:
    image: postgres:18
    environment:
      TZ: UTC
      PGTZ: UTC
      POSTGRES_DB: goodmoneying
      POSTGRES_USER: goodmoneying
      POSTGRES_PASSWORD: goodmoneying
    command: ["postgres", "-c", "timezone=UTC"]
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goodmoneying -d goodmoneying"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      TZ: UTC
      GOODMONEYING_OPERATOR_TOKEN: local-dev-token
      GOODMONEYING_DATABASE_URL: postgresql://goodmoneying:goodmoneying@postgres:5432/goodmoneying
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  upbit-gateway:
    build:
      context: .
      dockerfile: apps/upbit_gateway/Dockerfile
    environment:
      TZ: UTC
      UPBIT_GATEWAY_BASE_URL: https://api.upbit.com
      UPBIT_GATEWAY_TIMEOUT_SECONDS: ${UPBIT_GATEWAY_TIMEOUT_SECONDS:-10}
      UPBIT_GATEWAY_OPERATOR_TOKEN: ${GOODMONEYING_OPERATOR_TOKEN:-local-dev-token}
      UPBIT_GATEWAY_ALLOWED_ORIGINS: ${UPBIT_GATEWAY_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      UPBIT_ACCESS_KEY: ${UPBIT_ACCESS_KEY:-}
      UPBIT_SECRET_KEY: ${UPBIT_SECRET_KEY:-}
    ports:
      - "127.0.0.1:8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 12

  realtime-collection-worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: goodmoneying-realtime-collection-worker
    environment:
      TZ: UTC
      GOODMONEYING_OPERATOR_TOKEN: local-dev-token
      GOODMONEYING_DATABASE_URL: postgresql://goodmoneying:goodmoneying@postgres:5432/goodmoneying
      GOODMONEYING_LIVE_UPBIT: "1"
      GOODMONEYING_REALTIME_COLLECTION_INTERVAL_SECONDS: "60"
      GOODMONEYING_LOG_LEVEL: "INFO"
    depends_on:
      postgres:
        condition: service_healthy

  market-sync-worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: goodmoneying-market-sync-worker
    command: ["uv", "run", "--no-sync", "python", "-m", "goodmoneying_worker.data_foundation_worker"]
    environment:
      TZ: UTC
      GOODMONEYING_DATABASE_URL: postgresql://goodmoneying:goodmoneying@postgres:5432/goodmoneying
      GOODMONEYING_LIVE_UPBIT: "1"
      GOODMONEYING_MARKET_SYNC_INTERVAL_SECONDS: "300"
      GOODMONEYING_LOG_LEVEL: "INFO"
    depends_on:
      postgres:
        condition: service_healthy

  backfill-collection-worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: goodmoneying-backfill-collection-worker
    command: ["uv", "run", "--no-sync", "python", "-m", "goodmoneying_worker.backfill_collection_worker"]
    environment:
      TZ: UTC
      GOODMONEYING_OPERATOR_TOKEN: local-dev-token
      GOODMONEYING_DATABASE_URL: postgresql://goodmoneying:goodmoneying@postgres:5432/goodmoneying
      GOODMONEYING_LIVE_UPBIT: "1"
      GOODMONEYING_BACKFILL_POLL_SECONDS: "10"
      GOODMONEYING_BACKFILL_BATCH_SIZE: "3000"
      GOODMONEYING_LOG_LEVEL: "INFO"
    depends_on:
      postgres:
        condition: service_healthy

  candle-aggregation-worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: goodmoneying-candle-aggregation-worker
    command: ["uv", "run", "--no-sync", "python", "-m", "goodmoneying_worker.aggregation_collection_worker"]
    environment:
      TZ: UTC
      GOODMONEYING_DATABASE_URL: postgresql://goodmoneying:goodmoneying@postgres:5432/goodmoneying
      GOODMONEYING_AGGREGATION_POLL_SECONDS: "5"
      GOODMONEYING_LOG_LEVEL: "INFO"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      TZ: UTC
      GOODMONEYING_API_INTERNAL_URL: http://api:8000
      GOODMONEYING_UPBIT_GATEWAY_INTERNAL_URL: http://upbit-gateway:8001
      GOODMONEYING_OPERATOR_TOKEN: local-dev-token
    ports:
      - "5173:80"
    depends_on:
      - api
      - upbit-gateway

volumes:
  postgres-data:
