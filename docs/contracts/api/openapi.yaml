openapi: 3.1.0
info:
  title: goodmoneying 시스템 트레이딩 운영 API
  version: 0.2.0
  description: 업비트 데이터 기반(Data Foundation)과 기존 운영 기능의 HTTP API 계약.
servers:
  - url: http://localhost:8000
security: []
tags:
  - name: 상태(Health)
    description: 운영 서버(Operations Server)의 생존 여부와 기본 상태를 확인하는 API 그룹.
  - name: 대시보드(Dashboard)
    description: 운영 콘솔 첫 화면과 전체 수집 파이프라인 상태 요약을 제공하는 API 그룹.
  - name: 수집(Collection)
    description: 수집 후보군(Collection Candidate Pool), 활성 수집 대상, 커버리지, 수집 실행 이력을 관리하는 API 그룹.
  - name: 시장(Market)
    description: 업비트 시장 목록과 시장 단위 품질/거래 정보를 조회하는 API 그룹.
  - name: 상품(Instrument)
    description: 개별 거래 상품(Instrument)의 상세, 캔들(Candle), 현재가, 호가 요약 데이터를 조회하는 API 그룹.
  - name: 백필(Backfill)
    description: 과거 원천 데이터 백필(Backfill) 계획, 작업 시작, 작업 제어를 담당하는 API 그룹.
  - name: 알림(Notification)
    description: 운영 중 발생한 알림 이벤트(Notification Event)를 조회하는 API 그룹.
paths:
  /health:
    get:
      tags:
        - 상태(Health)
      summary: 헬스체크
      operationId: getHealth
      responses:
        "200":
          description: 서비스 상태
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/data-foundation:
    get:
      tags:
        - 수집(Collection)
      summary: 시장·자동 수집 정책·커버리지 품질 조회
      operationId: getDataFoundation
      responses:
        "200":
          description: UTC 정책 기준, 전체 시장과 5단계 커버리지 상태
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataFoundationResponse"
  /v1/data-foundation/markets/{marketCode}:
    patch:
      tags:
        - 수집(Collection)
      summary: 시장 수집 정책 상태 변경
      operationId: updateMarketTargetState
      security:
        - OperatorToken: []
      parameters:
        - name: marketCode
          in: path
          required: true
          schema:
            type: string
            pattern: "^[A-Z0-9]+-[A-Z0-9]+$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMarketTargetStateRequest"
      responses:
        "200":
          description: 저장된 시장 수집 정책 상태
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateMarketTargetStateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
  /v1/dashboard/summary:
    get:
      tags:
        - 대시보드(Dashboard)
      summary: 운영 상태 대시보드 요약
      operationId: getDashboardSummary
      responses:
        "200":
          description: 파이프라인 건강도와 주요 지표
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
  /v1/dashboard/summary/stream:
    get:
      tags:
        - 대시보드(Dashboard)
      summary: 운영 상태 대시보드 요약 SSE 스트림
      operationId: streamDashboardSummary
      parameters:
        - name: once
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: 테스트와 진단용 단일 이벤트 전송 여부
      responses:
        "200":
          description: 대시보드 요약을 dashboard 이벤트로 전송하는 SSE 스트림
          content:
            text/event-stream:
              schema:
                type: string
                description: "event: dashboard 형식의 SSE 스트림. data 필드는 DashboardSummary JSON이다."
  /v1/dashboard/overview:
    get:
      tags:
        - 대시보드(Dashboard)
      summary: 대시보드 핵심 상태 패널 조회
      operationId: getDashboardOverview
      responses:
        "200":
          description: KPI, 알림, 헬스체크, 지표 원칙
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardOverviewResponse"
  /v1/dashboard/targets:
    get:
      tags:
        - 대시보드(Dashboard)
      summary: 대시보드 수집 대상 패널 조회
      operationId: getDashboardTargets
      parameters:
        - $ref: "#/components/parameters/DashboardLimit"
        - $ref: "#/components/parameters/DashboardOffset"
      responses:
        "200":
          description: 수집 대상 행 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardTargetsResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
  /v1/dashboard/coverage:
    get:
      tags:
        - 대시보드(Dashboard)
      summary: 대시보드 커버리지 패널 조회
      operationId: getDashboardCoverage
      parameters:
        - $ref: "#/components/parameters/DashboardLimit"
        - $ref: "#/components/parameters/DashboardOffset"
      responses:
        "200":
          description: 데이터 유형별 커버리지 상태 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardCoverageResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
  /v1/dashboard/collection-activity:
    get:
      tags:
        - 대시보드(Dashboard)
      summary: 대시보드 수집 활동 패널 조회
      operationId: getDashboardCollectionActivity
      responses:
        "200":
          description: 최근 7일 x 24시간 수집 활동 버킷
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardCollectionActivityResponse"
  /v1/dashboard/realtime-heatmap:
    get:
      tags:
        - 대시보드(Dashboard)
      summary: 대시보드 실시간 수집 히트맵 패널 조회
      operationId: getDashboardRealtimeHeatmap
      parameters:
        - $ref: "#/components/parameters/DashboardLimit"
        - $ref: "#/components/parameters/DashboardOffset"
      responses:
        "200":
          description: 대상별 실시간 수집 히트맵 행 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardRealtimeHeatmapResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
  /v1/dashboard/storage-breakdown:
    get:
      tags:
        - 대시보드(Dashboard)
      summary: 대시보드 저장량 breakdown 패널 조회
      operationId: getDashboardStorageBreakdown
      responses:
        "200":
          description: 데이터 유형별 저장 행과 추정 저장량
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStorageBreakdownResponse"
  /v1/dashboard/operations-trend:
    get:
      tags:
        - 대시보드(Dashboard)
      summary: 대시보드 운영 추이 패널 조회
      operationId: getDashboardOperationsTrend
      responses:
        "200":
          description: 최근 7일 운영 추이
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardOperationsTrendResponse"
  /v1/dashboard/missing-ranges:
    get:
      tags:
        - 대시보드(Dashboard)
      summary: 대시보드 결측 상위 패널 조회
      operationId: getDashboardMissingRanges
      parameters:
        - $ref: "#/components/parameters/DashboardLimit"
        - $ref: "#/components/parameters/DashboardOffset"
      responses:
        "200":
          description: 결측 구간 상위 대상 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardMissingRangesResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
  /v1/dashboard/audit-log-summary:
    get:
      tags:
        - 대시보드(Dashboard)
      summary: 대시보드 감사 로그 요약 패널 조회
      operationId: getDashboardAuditLogSummary
      responses:
        "200":
          description: 최근 운영 변경 감사 로그 요약
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardAuditLogSummaryResponse"
  /v1/candidate-universe:
    get:
      tags:
        - 수집(Collection)
      summary: 수집 후보군 조회
      operationId: getCandidateUniverse
      responses:
        "200":
          description: 수집 후보군 상위 100개와 활성 수집 대상 상태
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateUniverseResponse"
  /v1/collection-targets:
    put:
      tags:
        - 수집(Collection)
      summary: 활성 수집 대상 저장
      operationId: updateCollectionTargets
      security:
        - OperatorToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCollectionTargetsRequest"
      responses:
        "200":
          description: 저장된 활성 수집 대상
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionTargetsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
  /v1/collection-targets/{instrumentId}/coverage-segments:
    get:
      tags:
        - 수집(Collection)
      summary: 코인별 수집 구간 lazy 조회
      operationId: getCollectionCoverageSegments
      parameters:
        - $ref: "#/components/parameters/InstrumentId"
      responses:
        "200":
          description: 확장 row에서 사용하는 구간형 수집 상태 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionCoverageSegmentsResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
  /v1/market-list:
    get:
      tags:
        - 시장(Market)
      summary: 관심종목 목록 조회
      operationId: getMarketList
      responses:
        "200":
          description: 관심 여부, 현재가, 거래대금, 등락률, 캔들 커버리지 기준 시작일과 현재일 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketListResponse"
  /v1/market-list/stream:
    get:
      tags:
        - 시장(Market)
      summary: 관심종목 목록 SSE 스트림
      operationId: streamMarketList
      parameters:
        - name: once
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: 테스트와 진단용 단일 이벤트 전송 여부
      responses:
        "200":
          description: 관심종목 가격 정보를 marketList 이벤트로 전송하는 SSE 스트림
          content:
            text/event-stream:
              schema:
                type: string
                description: "event: marketList 형식의 SSE 스트림. data 필드는 MarketListResponse JSON이다."
  /v1/instruments/{instrumentId}:
    get:
      tags:
        - 상품(Instrument)
      summary: 거래 상품 상세 조회
      operationId: getInstrumentDetail
      parameters:
        - $ref: "#/components/parameters/InstrumentId"
      responses:
        "200":
          description: 코인 상세 화면 View Model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstrumentDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
  /v1/instruments/{instrumentId}/candles:
    get:
      tags:
        - 상품(Instrument)
      summary: 캔들 조회
      operationId: getCandles
      parameters:
        - $ref: "#/components/parameters/InstrumentId"
        - name: unit
          in: query
          required: true
          schema:
            type: string
            enum: [1m, 3m, 5m, 10m, 15m, 30m, 60m, 240m, 1d]
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: 원천 또는 파생 캔들 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandleSeriesResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/ValidationError"
  /v1/instruments/{instrumentId}/ticker-snapshots:
    get:
      tags:
        - 상품(Instrument)
      summary: 현재가 스냅샷 조회
      operationId: getTickerSnapshots
      parameters:
        - $ref: "#/components/parameters/InstrumentId"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
      responses:
        "200":
          description: 현재가 스냅샷 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TickerSnapshotsResponse"
  /v1/instruments/{instrumentId}/orderbook-summaries:
    get:
      tags:
        - 상품(Instrument)
      summary: 호가 요약 조회
      operationId: getOrderbookSummaries
      parameters:
        - $ref: "#/components/parameters/InstrumentId"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
      responses:
        "200":
          description: 호가 요약 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderbookSummariesResponse"
  /v1/collection-runs:
    get:
      tags:
        - 수집(Collection)
      summary: 수집 실행 조회
      operationId: getCollectionRuns
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: 최근 수집 실행 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionRunsResponse"
  /v1/backfill/plans:
    post:
      tags:
        - 백필(Backfill)
      summary: 백필 계획 생성
      operationId: createBackfillPlan
      security:
        - OperatorToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBackfillPlanRequest"
      responses:
        "200":
          description: 보수적 추정치가 포함된 백필 계획
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackfillPlan"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
  /v1/backfill/jobs:
    get:
      tags:
        - 백필(Backfill)
      summary: 백필 작업 목록 조회
      operationId: getBackfillJobs
      responses:
        "200":
          description: 백필 작업 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackfillJobsResponse"
    post:
      tags:
        - 백필(Backfill)
      summary: 백필 작업 시작
      operationId: startBackfillJob
      security:
        - OperatorToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBackfillJobRequest"
      responses:
        "201":
          description: 생성된 백필 작업
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackfillJob"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
  /v1/backfill/jobs/{jobId}/{action}:
    post:
      tags:
        - 백필(Backfill)
      summary: 백필 작업 제어
      operationId: controlBackfillJob
      security:
        - OperatorToken: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum: [pause, stop, resume, safe-restart]
      responses:
        "200":
          description: 갱신된 백필 작업
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackfillJob"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
  /v1/backfill/jobs/{jobId}:
    delete:
      tags:
        - 백필(Backfill)
      summary: 백필 작업 삭제
      operationId: deleteBackfillJob
      security:
        - OperatorToken: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: 삭제 완료
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
  /v1/notifications:
    get:
      tags:
        - 알림(Notification)
      summary: 알림 이벤트 조회
      operationId: getNotificationEvents
      responses:
        "200":
          description: 알림 이벤트 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationEventsResponse"
components:
  securitySchemes:
    OperatorToken:
      type: apiKey
      in: header
      name: X-Operator-Token
  responses:
    BadRequest:
      description: 요청이 도메인 규칙을 만족하지 않음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: 운영 토큰이 없거나 올바르지 않음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: 요청한 리소스가 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: 요청 형식 검증 실패
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  parameters:
    InstrumentId:
      name: instrumentId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    From:
      name: from
      in: query
      required: true
      schema:
        type: string
        format: date-time
    To:
      name: to
      in: query
      required: true
      schema:
        type: string
        format: date-time
    DashboardLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 100
    DashboardOffset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
  schemas:
    DecimalString:
      description: JSON number 정밀도 손실을 피하기 위해 문자열로 전달하는 십진수 값.
      type: string
      pattern: "^-?[0-9]+(\\.[0-9]+)?$"
    ErrorResponse:
      description: API 오류 코드와 사용자 표시용 메시지를 담는 공통 오류 응답.
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
    HealthResponse:
      description: 운영 서버의 현재 상태와 점검 시각을 담는 헬스체크 응답.
      type: object
      required: [status, checkedAt]
      properties:
        status:
          type: string
          enum: [ok, degraded, down]
        checkedAt:
          type: string
          format: date-time
    CoverageCounts:
