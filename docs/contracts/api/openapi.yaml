        - collectionActivity
        - realtimeCollectionHeatmap
        - workerStatus
        - storageBreakdown
        - operationsTrend
        - missingRangeTop
        - auditLogSummary
      properties:
        status:
          type: string
          enum: [normal, warning, incident]
        refreshedAt:
          type: string
          format: date-time
        totals:
          type: object
          required:
            - activeTargets
            - activeTargetLimit
            - normalTargets
            - warningTargets
            - incidentTargets
            - failedRuns24h
            - failureRate24h
            - delayedTargets
            - missingRangesOpen
            - storageBytesToday
            - storageBytesTodayDisplay
            - storageRowsToday
            - realtimeRowsLastMinute
            - backfillRowsLastMinute
            - recentRequestCount
          properties:
            activeTargets:
              type: integer
            activeTargetLimit:
              type: integer
            normalTargets:
              type: integer
            warningTargets:
              type: integer
            incidentTargets:
              type: integer
            failedRuns24h:
              type: integer
            failureRate24h:
              $ref: "#/components/schemas/DecimalString"
            delayedTargets:
              type: integer
            missingRangesOpen:
              type: integer
            storageBytesToday:
              type: integer
              description: KST 오늘 생성 또는 수집된 원천/결과 행 기반 추정 저장량.
            storageBytesTodayDisplay:
              type: string
            storageRowsToday:
              type: integer
              description: KST 오늘 생성 또는 수집된 원천/결과 행 수.
            realtimeRowsLastMinute:
              type: integer
              description: 최근 1분 실시간 증분 수집이 저장한 row 수.
            backfillRowsLastMinute:
              type: integer
              description: 최근 1분 백필 수집이 저장한 row 수.
            recentRequestCount:
              type: integer
              description: 최근 24시간 대상별 수집 결과 행 수. API 요청 수가 아니다.
        coverage:
          type: array
          items:
            $ref: "#/components/schemas/CoverageStatus"
        targets:
          type: array
          items:
            $ref: "#/components/schemas/CollectionDashboardTarget"
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/NotificationEvent"
        healthChecks:
          type: array
          items:
            $ref: "#/components/schemas/HealthCheck"
        metricPrinciples:
          type: array
          description: 실제 관측 근거가 없어서 표시하지 않는 운영 지표 원칙. 프론트엔드는 이 View Model만 렌더링하고 금지 지표 값을 합성하지 않는다.
          items:
            $ref: "#/components/schemas/MetricPrinciple"
        collectionActivity:
          type: array
          description: 최근 7일 x 24시간 수집 실행과 대상별 수집 결과 기반 활동 버킷.
          items:
            $ref: "#/components/schemas/CollectionActivityBucket"
        realtimeCollectionHeatmap:
          type: array
          description: 실시간 수집량 비교와 타입별 수집 상태를 보여주는 코인별 히트맵 데이터.
          items:
            $ref: "#/components/schemas/RealtimeCollectionHeatmapRow"
        workerStatus:
          $ref: "#/components/schemas/CollectionWorkerStatus"
        storageBreakdown:
          type: array
          description: KST 오늘 저장된 행 수와 명시적 row-size 추정 규칙 기반 저장량 분해.
          items:
            $ref: "#/components/schemas/StorageBreakdownItem"
        operationsTrend:
          type: array
          description: 최근 7일 저장량, 커버리지, 주의/장애 대상 추이.
          items:
            $ref: "#/components/schemas/OperationsTrendPoint"
        missingRangeTop:
          type: array
          description: source_candle 커버리지 계산 결과 기준 결측 구간 상위 코인.
          items:
            $ref: "#/components/schemas/MissingRangeSummary"
        auditLogSummary:
          $ref: "#/components/schemas/AuditLogSummary"
    MetricPrinciple:
      description: 실제 관측 근거가 없어 제외하거나 표시하는 운영 지표의 판단 근거.
      type: object
      required: [metricKey, label, displayStatus, evidenceStatus, reason]
      properties:
        metricKey:
          type: string
          enum: [rateLimitRemainingPercent, duplicateRows24h]
        label:
          type: string
        displayStatus:
          type: string
          enum: [displayed, excluded]
        evidenceStatus:
          type: string
          enum: [available, missing_persistence, missing_measurement]
        reason:
          type: string
    CollectionActivityBucket:
      description: 시간 버킷 단위의 수집 실행량과 결과량을 표현하는 활동 지표.
      type: object
      required: [bucketStartAt, runCount, resultCount, status]
      properties:
        bucketStartAt:
          type: string
          format: date-time
        runCount:
          type: integer
        resultCount:
          type: integer
        status:
          type: string
          enum: [none, low, collecting, high]
    RealtimeCollectionHeatmapCell:
      description: 1시간 단위 체결 빈도와 체결 강도, 체결량, 체결금액을 담은 셀.
      type: object
      required:
        - bucketStartAt
        - tradeCount
        - averageTradesPerMinute
        - tradeStrength
        - tradeVolume
        - tradeAmount
        - status
      properties:
        bucketStartAt:
          type: string
          format: date-time
        tradeCount:
          type: integer
          description: 1시간 동안 수신한 체결 이벤트 수.
        averageTradesPerMinute:
          $ref: "#/components/schemas/DecimalString"
        tradeStrength:
          $ref: "#/components/schemas/DecimalString"
          description: BID 체결량을 ASK 체결량으로 나눈 뒤 100을 곱한 값.
        tradeVolume:
          $ref: "#/components/schemas/DecimalString"
        tradeAmount:
          $ref: "#/components/schemas/DecimalString"
        status:
          type: string
          enum: [red, orange, yellow, blue, green]
    RealtimeCollectionHeatmapRow:
      description: 대상별 24개 시간대 실시간 체결 빈도 히트맵 행.
      type: object
      required: [instrument, instrumentDisplayName, hourlyBuckets]
      properties:
        instrument:
          $ref: "#/components/schemas/Instrument"
        instrumentDisplayName:
          type: string
        hourlyBuckets:
          type: array
          items:
            $ref: "#/components/schemas/RealtimeCollectionHeatmapCell"
    StorageBreakdownItem:
      description: 데이터 유형별 저장 행 수와 추정 저장량 분해 항목.
      type: object
      required: [dataType, label, rowCount, bytes, bytesDisplay, sharePercent]
