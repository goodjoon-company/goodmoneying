components:
  securitySchemes:
    OperatorToken:
      type: apiKey
      in: header
      name: X-Operator-Token
  responses:
    BadRequest:
      description: 요청이 도메인 규칙을 만족하지 않음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: 운영 토큰이 없거나 올바르지 않음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: 요청한 리소스가 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: 요청이 현재 리소스 상태나 멱등 키 문맥과 충돌함
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: 요청 형식 검증 실패
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: 필요한 저장소나 외부 의존성이 준비되지 않음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  parameters:
    PageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 100
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    DatasetVersionId:
      name: datasetVersionId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    InstrumentId:
      name: instrumentId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    From:
      name: from
      in: query
      required: true
      schema:
        type: string
        format: date-time
    To:
      name: to
      in: query
      required: true
      schema:
        type: string
        format: date-time
    DashboardLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 100
    DashboardOffset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
  schemas:
    DecimalString:
      description: JSON number 정밀도 손실을 피하기 위해 문자열로 전달하는 십진수 값.
      type: string
      pattern: "^-?[0-9]+(\\.[0-9]+)?$"
    ErrorResponse:
      description: API 오류 코드와 사용자 표시용 메시지를 담는 공통 오류 응답.
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
    StrategyGraphPort:
      description: 전략 graph node의 입력 또는 출력 port 자료형과 시간 주기.
      type: object
      additionalProperties: false
      required: [name, dataType]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        dataType:
          type: string
          minLength: 1
          maxLength: 100
        timeframe:
          type: [string, "null"]
          enum: [1m, 3m, 5m, 10m, 15m, 30m, 1h, 4h, 1d, 1w, 1M, null]
    StrategyGraphNode:
      description: 전략 graph의 형식 지정 node. config는 node type별 검증기가 해석한다.
      type: object
      additionalProperties: false
      required: [id, type, config, input_ports, output_ports]
      properties:
        id:
          type: string
          minLength: 1
          maxLength: 200
        type:
          type: string
          minLength: 1
          maxLength: 100
        config:
          type: object
          additionalProperties: true
        input_ports:
          type: array
          items:
            $ref: "#/components/schemas/StrategyGraphPort"
        output_ports:
          type: array
          items:
            $ref: "#/components/schemas/StrategyGraphPort"
    StrategyGraphEdge:
      description: 한 node output port에서 다른 node input port로 이어지는 방향 edge.
      type: object
      additionalProperties: false
      required: [from_node, from_port, to_node, to_port]
      properties:
        from_node: {type: string, minLength: 1, maxLength: 200}
        from_port: {type: string, minLength: 1, maxLength: 100}
        to_node: {type: string, minLength: 1, maxLength: 200}
        to_port: {type: string, minLength: 1, maxLength: 100}
    StrategyGraphOutput:
      description: 전략 버전이 외부 실행 계층에 노출하는 출력 port.
      type: object
      additionalProperties: false
      required: [node, port]
      properties:
        node: {type: string, minLength: 1, maxLength: 200}
        port: {type: string, minLength: 1, maxLength: 100}
    StrategyGraph:
      description: P3 전략 스튜디오와 백테스트·봇 실행 계층이 공유하는 형식 안전 DAG 계약.
      type: object
      additionalProperties: false
      required: [schema_version, nodes, edges, outputs]
      properties:
        schema_version:
          type: string
          const: strategy-graph-v1
        nodes:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: "#/components/schemas/StrategyGraphNode"
        edges:
          type: array
          maxItems: 2000
          items:
            $ref: "#/components/schemas/StrategyGraphEdge"
        outputs:
          type: array
          minItems: 1
          maxItems: 20
          items:
            $ref: "#/components/schemas/StrategyGraphOutput"
    ValidateStrategyGraphRequest:
      description: 전략 graph 서버 검증 요청.
      type: object
      additionalProperties: false
      required: [graph]
      properties:
        graph:
          $ref: "#/components/schemas/StrategyGraph"
    StrategyValidationError:
      description: 전략 graph 검증 실패를 UI node와 error summary에 연결하기 위한 안정 오류 코드.
      type: object
      required: [code, nodeId, edgeIndex, message]
      properties:
        code:
          type: string
          enum:
            - cycle_detected
            - port_type_mismatch
            - timeframe_incompatible
            - look_ahead_detected
            - parameter_out_of_range
            - missing_data_policy_required
            - insufficient_warmup
            - missing_output
        message:
          type: string
        nodeId:
          type: [string, "null"]
        edgeIndex:
          type: [integer, "null"]
          minimum: 0
    StrategyValidationResponse:
      description: 전략 graph의 서버 검증 결과, canonical hash, 안정 오류 목록.
      type: object
      required: [valid, errors, graphHash]
      properties:
        valid:
          type: boolean
        graphHash:
          type: string
          pattern: "^[0-9a-f]{64}$"
        errors:
          type: array
          items:
            $ref: "#/components/schemas/StrategyValidationError"
    StrategyCommandFields:
      description: 전략 변경 명령의 감사·멱등 메타데이터.
      type: object
      additionalProperties: false
      required: [requestId, idempotencyKey, actorId, requestedAt, reason]
      properties:
        requestId: {type: string, minLength: 1, maxLength: 200}
        idempotencyKey: {type: string, minLength: 1, maxLength: 200}
        actorId: {type: string, minLength: 1, maxLength: 200}
        requestedAt: {type: string, format: date-time}
        reason: {type: string, minLength: 1, maxLength: 500}
    CreateStrategyRequest:
      description: 전략 정의를 만들기 위한 감사 가능한 명령 요청.
      type: object
      additionalProperties: false
      required: [requestId, idempotencyKey, actorId, requestedAt, reason, ownerId, name]
      properties:
        requestId: {type: string, minLength: 1, maxLength: 200}
        idempotencyKey: {type: string, minLength: 1, maxLength: 200}
        actorId: {type: string, minLength: 1, maxLength: 200}
        requestedAt: {type: string, format: date-time}
        reason: {type: string, minLength: 1, maxLength: 500}
        ownerId:
          type: string
          minLength: 1
          maxLength: 200
        name:
          type: string
          minLength: 1
          maxLength: 200
    StrategyDefinition:
      description: 전략 정의 목록과 생성 응답에 사용하는 요약 모델.
      type: object
      required: [strategyId, ownerId, name, createdAt]
      properties:
        strategyId:
          type: integer
          format: int64
        ownerId:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time
    PublishStrategyVersionRequest:
      description: 서버 검증을 통과한 전략 graph를 불변 version으로 게시하는 명령.
      type: object
      additionalProperties: false
      required: [requestId, idempotencyKey, actorId, requestedAt, reason, graph]
      properties:
        requestId: {type: string, minLength: 1, maxLength: 200}
        idempotencyKey: {type: string, minLength: 1, maxLength: 200}
        actorId: {type: string, minLength: 1, maxLength: 200}
        requestedAt: {type: string, format: date-time}
        reason: {type: string, minLength: 1, maxLength: 500}
        graph: {$ref: "#/components/schemas/StrategyGraph"}
    StrategyVersion:
      description: 게시 후 graph와 parameter 의미가 바뀌지 않는 전략 버전.
      type: object
      required: [strategyVersionId, strategyId, version, schemaVersion, status, graphHash, validation, graph, createdAt, publishedAt]
      properties:
        strategyVersionId:
          type: integer
          format: int64
        strategyId:
          type: integer
          format: int64
        version:
          type: integer
          minimum: 1
        schemaVersion:
          type: string
          const: strategy-graph-v1
        status:
          type: string
          enum: [draft, validated, published, retired]
        graphHash:
          type: string
          pattern: "^[0-9a-f]{64}$"
        validation:
          $ref: "#/components/schemas/StrategyValidationResponse"
        graph:
          $ref: "#/components/schemas/StrategyGraph"
        createdAt:
          type: string
          format: date-time
        publishedAt:
          type: [string, "null"]
          format: date-time
    StrategyVersionsResponse:
      description: 특정 전략의 불변 버전 목록 응답.
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/StrategyVersion"
        nextCursor:
          type: [string, "null"]
    HealthResponse:
      description: 운영 서버의 현재 상태와 점검 시각을 담는 헬스체크 응답.
      type: object
      required: [status, checkedAt]
      properties:
        status:
          type: string
          enum: [ok, degraded, down]
        checkedAt:
          type: string
          format: date-time
    CoverageCounts:
      description: 증거로 분류한 5단계 커버리지 구간 수.
      type: object
      additionalProperties: false
      required: [available, no_trade, missing, unavailable, unverified]
      properties:
        available: { type: integer, minimum: 0 }
        no_trade: { type: integer, minimum: 0 }
        missing: { type: integer, minimum: 0 }
        unavailable: { type: integer, minimum: 0 }
        unverified: { type: integer, minimum: 0 }
    DatasetSeriesSelection:
      description: 데이터셋 버전에 포함할 상품별 저장 시계열 선택.
      type: object
      additionalProperties: false
      required: [instrumentId, dataKind, unit, definitionSetHash, calculationVersion]
      properties:
        instrumentId: {type: integer, format: int64, minimum: 1}
        dataKind:
          type: string
          enum: [candle, indicator, market_statistic, microstructure]
        unit:
          type: string
          enum: [1m, 3m, 5m, 10m, 15m, 30m, 1h, 4h, 1d, 1w, 1M]
        definitionSetHash:
          type: [string, "null"]
          pattern: "^[0-9a-f]{64}$"
        calculationVersion:
          type: [string, "null"]
          minLength: 1
          maxLength: 100
    DatasetSelection:
      description: 생성 접수 트랜잭션에서 프런티어를 고정할 UTC 반개방 범위와 시계열.
      type: object
      additionalProperties: false
      required: [asOf, from, to, series]
      properties:
        asOf:
          type: string
          format: date-time
          description: UTC 지식 시각 상한이며 명령 requestedAt 이후일 수 없다.
        from: {type: string, format: date-time, description: 포함하는 UTC 범위 시작.}
        to: {type: string, format: date-time, description: 제외하는 UTC 범위 끝.}
        series:
          type: array
          minItems: 1
          maxItems: 200
          uniqueItems: true
          items:
            $ref: "#/components/schemas/DatasetSeriesSelection"
    DatasetPolicies:
      description: 미래 참조와 분석 계층 채움·결측 처리를 고정하는 버전 정책.
      type: object
      additionalProperties: false
      required: [availabilityPolicy, fillPolicy, missingPolicy]
      properties:
        availabilityPolicy:
          type: string
          const: point_in_time_v1
        fillPolicy:
          type: string
          enum: [none, no_trade_carry_forward_v1]
          description: P2는 정책만 고정하며 P3/P4 소비자가 확정 no_trade candle에 적용한다. series GET은 합성하지 않는다.
        missingPolicy:
          type: string
          enum: [fail, "null", drop]
          description: fail은 P2 게시를 차단하고 null·drop은 P3/P4 소비 의미를 고정한다. series GET은 placeholder를 만들거나 member를 제거하지 않는다.
    CreateDatasetBuildRequest:
      description: 운영자가 불변 데이터셋 버전 생성을 접수하는 멱등 명령.
      type: object
      additionalProperties: false
      required: [requestId, idempotencyKey, actorId, requestedAt, reason, selection, policies]
      properties:
        requestId: {type: string, minLength: 1, maxLength: 200, pattern: ".*\\S.*"}
        idempotencyKey: {type: string, minLength: 1, maxLength: 200, pattern: ".*\\S.*"}
        actorId: {type: string, minLength: 1, maxLength: 200, pattern: ".*\\S.*"}
        requestedAt: {type: string, format: date-time, description: UTC 명령 요청 시각.}
        reason: {type: string, minLength: 1, maxLength: 500, pattern: ".*\\S.*"}
        selection:
          $ref: "#/components/schemas/DatasetSelection"
        policies:
          $ref: "#/components/schemas/DatasetPolicies"
    DatasetBuild:
      description: 선택 프런티어가 접수 시점에 고정된 데이터셋 생성 작업.
      type: object
      additionalProperties: false
      required: [buildId, requestId, idempotencyKey, actorId, requestedAt, frozenAt, status, attemptCount, maxAttempts, nextRetryAt, deadLetterReason, datasetVersionId, errorCode, errorMessage]
      properties:
        buildId: {type: integer, format: int64, minimum: 1}
        requestId: {type: string}
        idempotencyKey: {type: string}
        actorId: {type: string}
        requestedAt: {type: string, format: date-time}
        frozenAt: {type: string, format: date-time}
        status:
          type: string
          enum: [pending, running, retry_wait, succeeded, failed, dead_letter, cancelled]
        attemptCount: {type: integer, minimum: 0}
        maxAttempts: {type: integer, minimum: 1}
        nextRetryAt: {type: [string, "null"], format: date-time}
        deadLetterReason: {type: [string, "null"]}
        datasetVersionId: {type: [integer, "null"], format: int64, minimum: 1}
        errorCode: {type: [string, "null"]}
        errorMessage: {type: [string, "null"]}
    DatasetBuilds:
      description: 최초 데이터셋 생성 작업 ID 상한에 고정된 build 목록 페이지.
      type: object
      additionalProperties: false
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DatasetBuild"
        nextCursor:
          type: [string, "null"]
    DatasetVersionSeries:
      description: 버전이 고정한 시계열과 계산 의미.
      type: object
      additionalProperties: false
      required: [seriesId, instrumentId, dataKind, unit, definitionSetHash, calculationVersion]
      properties:
        seriesId: {type: integer, format: int64, minimum: 1}
        instrumentId: {type: integer, format: int64, minimum: 1}
        dataKind:
          type: string
          enum: [candle, indicator, market_statistic, microstructure]
        unit: {type: string}
        definitionSetHash: {type: [string, "null"], pattern: "^[0-9a-f]{64}$"}
        calculationVersion: {type: [string, "null"]}
    DatasetVersion:
      description: 내용·인과성·채움·결측 정책을 수정할 수 없는 연구 데이터셋 버전.
      type: object
      additionalProperties: false
      required: [datasetVersionId, schemaVersion, asOf, from, to, contentHash, availabilityPolicy, fillPolicy, missingPolicy, createdAt, series]
      properties:
        datasetVersionId: {type: integer, format: int64, minimum: 1}
        schemaVersion: {type: string, const: dataset-v1}
        asOf: {type: string, format: date-time}
        from: {type: string, format: date-time}
        to: {type: string, format: date-time}
        contentHash: {type: string, pattern: "^[0-9a-f]{64}$"}
        availabilityPolicy: {type: string, const: point_in_time_v1}
        fillPolicy: {type: string, enum: [none, no_trade_carry_forward_v1]}
        missingPolicy: {type: string, enum: [fail, "null", drop]}
        createdAt: {type: string, format: date-time}
        series:
          type: array
          items:
            $ref: "#/components/schemas/DatasetVersionSeries"
    DatasetVersionsResponse:
      description: 최초 데이터셋 버전 ID 상한에 고정된 저장 전용 목록 페이지.
      type: object
      additionalProperties: false
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DatasetVersion"
        nextCursor: {type: [string, "null"]}
    DatasetCoverageItem:
      description: 데이터셋 생성 시점에 고정한 series별 반개방 품질 구간.
      type: object
      additionalProperties: false
      required: [seriesId, rangeStartAt, rangeEndAt, knowledgeAt, status, bucketCount]
      properties:
        seriesId: {type: integer, format: int64, minimum: 1}
        rangeStartAt: {type: string, format: date-time}
        rangeEndAt: {type: string, format: date-time}
        knowledgeAt:
          type: string
          format: date-time
          description: 품질 상태를 알게 된 UTC 시각.
        status:
          type: string
          enum: [available, no_trade, missing, unavailable, unverified]
        bucketCount: {type: integer, minimum: 0}
    DatasetCoverage:
      description: 요청 범위와 시점 기준 거래 가능 범위를 함께 보존하는 커버리지 스냅숏.
      type: object
      additionalProperties: false
      required: [datasetVersionId, snapshotHash, requestedBucketCount, eligibleBucketCount, usableRatio, counts, items]
      properties:
        datasetVersionId: {type: integer, format: int64, minimum: 1}
        snapshotHash: {type: string, pattern: "^[0-9a-f]{64}$"}
        requestedBucketCount: {type: integer, minimum: 0}
        eligibleBucketCount: {type: integer, minimum: 0}
        usableRatio:
          $ref: "#/components/schemas/DecimalString"
        counts:
          $ref: "#/components/schemas/CoverageCounts"
        items:
          type: array
          items:
            $ref: "#/components/schemas/DatasetCoverageItem"
    DatasetSeriesPoint:
      description: 평가 시각 인과성과 고정 내용 해시를 가진 데이터셋 시계열 한 점.
      type: object
      additionalProperties: false
      required: [occurredAt, knowledgeAt, quality, contentHash, values]
      properties:
        occurredAt: {type: string, format: date-time}
        knowledgeAt: {type: string, format: date-time}
        quality:
          type: string
          enum: [available, no_trade, missing, unavailable, unverified]
        contentHash: {type: string, pattern: "^[0-9a-f]{64}$"}
        values:
          type: object
          additionalProperties: true
    DatasetSeriesResponse:
      description: 데이터셋 버전과 최초 멤버 상한에 고정된 저장 전용 시계열 페이지.
      type: object
      additionalProperties: false
      required: [datasetVersionId, seriesId, dataKind, unit, items, nextCursor]
      properties:
        datasetVersionId: {type: integer, format: int64, minimum: 1}
        seriesId: {type: integer, format: int64, minimum: 1}
        dataKind:
          type: string
          enum: [candle, indicator, market_statistic, microstructure]
        unit: {type: string}
        items:
          type: array
          items:
            $ref: "#/components/schemas/DatasetSeriesPoint"
        nextCursor: {type: [string, "null"]}
    DataFoundationMarket:
      description: 공식 시장 상태, 자동 수집 정책과 품질 구간을 합친 시장 행.
      type: object
      additionalProperties: false
      required:
        - instrumentId
        - marketCode
        - koreanName
        - englishName
        - quoteCurrency
        - tradingStatus
        - marketWarning
        - targetStatus
        - activeDataTypeCount
        - totalDataTypeCount
        - coverageCounts
        - collectionPolicy
      properties:
        instrumentId: { type: integer, format: int64, minimum: 1 }
        marketCode: { type: string }
        koreanName: { type: string }
        englishName: { type: string }
        quoteCurrency: { type: string }
        tradingStatus:
          type: string
          enum: [active, inactive, delisted, unknown]
        marketWarning: { type: string }
        targetStatus:
          type: string
          enum: [active, paused, excluded, not_targeted]
        activeDataTypeCount: { type: integer, minimum: 0 }
        totalDataTypeCount: { type: integer, minimum: 0 }
        coverageCounts:
          $ref: "#/components/schemas/CoverageCounts"
        collectionPolicy:
          oneOf:
            - $ref: "#/components/schemas/MarketCollectionPolicy"
            - type: "null"
    MarketCollectionPolicy:
      description: 시장별 과거·실시간 자동 수집 설정 스냅숏.
      type: object
      additionalProperties: false
      required: [startAt, dataTypes, candleUnit, retentionDays, priority, continuous]
      properties:
        startAt:
          type: string
          format: date-time
          description: UTC RFC 3339 수집 시작 시각.
        dataTypes:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [source_candle, trade_event, orderbook_snapshot, ticker_snapshot]
        candleUnit:
          type: string
          const: 1m
        retentionDays:
          type: [integer, "null"]
          minimum: 1
          maximum: 36500
        priority:
          type: integer
          minimum: 1
          maximum: 1000
        continuous:
          type: boolean
    DataFoundationResponse:
      description: UTC 기본 정책과 전체 시장 데이터 기반 현황.
      type: object
      additionalProperties: false
      required: [timeZone, policyStartAt, summary, markets]
      properties:
        timeZone:
          type: string
          const: UTC
        policyStartAt:
          type: string
          format: date-time
        summary:
          type: object
          additionalProperties: false
          required:
            - marketCount
            - krwMarketCount
            - activeTargetCount
            - pendingBackfillJobCount
            - desiredSubscriptionCount
            - coverageCounts
          properties:
            marketCount: { type: integer, minimum: 0 }
            krwMarketCount: { type: integer, minimum: 0 }
            activeTargetCount: { type: integer, minimum: 0 }
            pendingBackfillJobCount: { type: integer, minimum: 0 }
            desiredSubscriptionCount: { type: integer, minimum: 0 }
            coverageCounts:
              $ref: "#/components/schemas/CoverageCounts"
        markets:
          type: array
          items:
            $ref: "#/components/schemas/DataFoundationMarket"
    UpdateMarketTargetStateRequest:
      description: 운영자가 시장 수집 정책을 활성·일시정지·제외하는 명령.
      type: object
      additionalProperties: false
      required: [requestId, idempotencyKey, actorId, requestedAt, state, reason]
      properties:
        requestId: { type: string, minLength: 1, maxLength: 200, pattern: ".*\\S.*" }
        idempotencyKey: { type: string, minLength: 1, maxLength: 200, pattern: ".*\\S.*" }
        actorId: { type: string, minLength: 1, maxLength: 200, pattern: ".*\\S.*" }
        requestedAt:
          type: string
          format: date-time
          description: UTC RFC 3339 명령 요청 시각.
        state:
          type: string
          enum: [active, paused, excluded]
        reason:
          type: string
          minLength: 1
          maxLength: 500
          pattern: ".*\\S.*"
        policy:
          $ref: "#/components/schemas/MarketCollectionPolicy"
    UpdateMarketTargetStateResponse:
      description: 저장된 시장 수집 정책 변경 결과.
      type: object
      additionalProperties: false
      required: [marketCode, state, changedAt]
      properties:
        marketCode: { type: string }
        state:
          type: string
          enum: [active, paused, excluded]
        changedAt:
          type: string
          format: date-time
    Instrument:
      description: 업비트 거래 상품의 내부 식별자와 표시용 시장 정보를 담는 공통 모델.
      type: object
      required: [id, exchange, marketCode, quoteCurrency, baseAsset, displayName]
      properties:
        id:
          type: integer
          format: int64
        exchange:
          type: string
          enum: [UPBIT]
        marketCode:
          type: string
          example: KRW-BTC
        quoteCurrency:
          type: string
          example: KRW
        baseAsset:
          type: string
          example: BTC
        displayName:
          type: string
    DashboardTotals:
      description: 대시보드 핵심 KPI와 최근 수집/저장 상태 집계.
      type: object
      required:
        - activeTargets
        - activeTargetLimit
        - normalTargets
        - warningTargets
        - incidentTargets
        - failedRuns24h
        - failureRate24h
        - delayedTargets
        - missingRangesOpen
        - storageBytesToday
        - storageBytesTodayDisplay
        - storageRowsToday
        - realtimeRowsLastMinute
        - backfillRowsLastMinute
        - recentRequestCount
      properties:
        activeTargets:
          type: integer
        activeTargetLimit:
          type: integer
        normalTargets:
          type: integer
        warningTargets:
          type: integer
        incidentTargets:
          type: integer
        failedRuns24h:
          type: integer
        failureRate24h:
          $ref: "#/components/schemas/DecimalString"
        delayedTargets:
          type: integer
        missingRangesOpen:
          type: integer
        storageBytesToday:
          type: integer
          description: KST 오늘 생성 또는 수집된 원천/결과 행 기반 추정 저장량.
        storageBytesTodayDisplay:
          type: string
        storageRowsToday:
          type: integer
          description: KST 오늘 생성 또는 수집된 원천/결과 행 수.
        realtimeRowsLastMinute:
          type: integer
          description: 최근 1분 실시간 증분 수집이 저장한 row 수.
        backfillRowsLastMinute:
          type: integer
          description: 최근 1분 백필 수집이 저장한 row 수.
        recentRequestCount:
          type: integer
          description: 최근 24시간 대상별 수집 결과 행 수. API 요청 수가 아니다.
    DashboardOverviewResponse:
      description: 대시보드 첫 영역에서 사용하는 KPI, 알림, 헬스체크, 지표 원칙 패널 응답.
      type: object
      required:
        - status
        - refreshedAt
        - recommendedRefreshSeconds
        - totals
        - alerts
        - healthChecks
        - metricPrinciples
      properties:
        status:
          type: string
          enum: [normal, warning, incident]
        refreshedAt:
          type: string
          format: date-time
        recommendedRefreshSeconds:
          type: integer
        totals:
          $ref: "#/components/schemas/DashboardTotals"
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/NotificationEvent"
        healthChecks:
          type: array
          items:
            $ref: "#/components/schemas/HealthCheck"
        metricPrinciples:
          type: array
          items:
            $ref: "#/components/schemas/MetricPrinciple"
    DashboardTargetsResponse:
      description: 대시보드 수집 대상 패널의 페이지 응답.
      type: object
      required: [items, total, limit, offset, recommendedRefreshSeconds, refreshedAt]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CollectionDashboardTarget"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        recommendedRefreshSeconds:
          type: integer
        refreshedAt:
          type: string
          format: date-time
    DashboardCoverageResponse:
      description: 대시보드 커버리지 패널의 페이지 응답.
      type: object
      required: [items, total, limit, offset, recommendedRefreshSeconds, refreshedAt]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CoverageStatus"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        recommendedRefreshSeconds:
          type: integer
        refreshedAt:
          type: string
          format: date-time
    DashboardCollectionActivityResponse:
      description: 대시보드 수집 활동 패널 응답.
      type: object
      required: [items, recommendedRefreshSeconds, refreshedAt]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CollectionActivityBucket"
        recommendedRefreshSeconds:
          type: integer
        refreshedAt:
          type: string
