      type: object
      required:
        - status
        - statusLabel
        - statusDetail
        - lastHeartbeatAt
        - lastCollectedAt
        - totalErrorCount
        - failureRateAll
        - runningTargetCount
        - totalTargetCount
        - queuedJobCount
        - queuedTargetCount
        - diagnostics
        - recentErrors
      properties:
        status:
          type: string
          enum: [running, gated, stale, failed]
        statusLabel:
          type: string
        statusDetail:
          type: string
        lastHeartbeatAt:
          type: [string, "null"]
          format: date-time
        lastCollectedAt:
          type: [string, "null"]
          format: date-time
        totalErrorCount:
          type: integer
        failureRateAll:
          $ref: "#/components/schemas/DecimalString"
        runningTargetCount:
          type: integer
        totalTargetCount:
          type: integer
        queuedJobCount:
          type: integer
        queuedTargetCount:
          type: integer
        diagnostics:
