        dataType:
          type: string
          enum: [source_candle, ticker_snapshot, orderbook_summary]
        status:
          type: string
          enum: [collected, missing, collecting, future]
        offsetPercent:
          $ref: "#/components/schemas/DecimalString"
        widthPercent:
          $ref: "#/components/schemas/DecimalString"
        segmentStartAt:
          type: string
          format: date-time
        segmentEndAt:
          type: string
          format: date-time
        label:
          type: string
