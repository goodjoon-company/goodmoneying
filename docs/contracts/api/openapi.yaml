        tickerFreshnessLabel:
          type: string
        coveragePercent:
          $ref: "#/components/schemas/DecimalString"
        storageRowCount:
          type: integer
          description: 화면 표시용 저장 행 수.
        storageBytesDisplay:
          type: string
