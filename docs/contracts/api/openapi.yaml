        - statusDetail
        - lastHeartbeatAt
        - lastCollectedAt
        - collectedRowCount24h
        - errorCount24h
        - failureRate24h
        - diagnostics
        - recentErrors
      properties:
        status:
          type: string
          enum: [running, gated, stale, failed]
        statusLabel:
          type: string
        statusDetail:
          type: string
        lastHeartbeatAt:
          type: [string, "null"]
          format: date-time
        lastCollectedAt:
          type: [string, "null"]
          format: date-time
        collectedRowCount24h:
          type: integer
          description: 최근 24시간 실시간 수집이 저장한 ticker/orderbook/candle row 합계.
        errorCount24h:
          type: integer
        failureRate24h:
          $ref: "#/components/schemas/DecimalString"
        diagnostics:
