        - instrument
        - rank
        - accTradePrice24h
        - accTradePrice24hDisplay
        - selected
        - favoriteOrder
        - candidateStatus
        - qualityStatus
        - qualityDetail
        - collectionRangeDisplay
        - collectedStartAt
        - collectedEndAt
        - isRealtimeTarget
      properties:
        instrument:
          $ref: "#/components/schemas/Instrument"
        rank:
          type: integer
        accTradePrice24h:
          $ref: "#/components/schemas/DecimalString"
