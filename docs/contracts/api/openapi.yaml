          type: array
          items:
            $ref: "#/components/schemas/BackfillJob"
    BackfillJob:
      description: 백필 작업의 상태, 데이터 유형, 진행률, 대상 범위, 대상 코인, 생성 시각 모델.
      type: object
      required: [id, status, dataType, progressPercent, estimatedRequestCount, totalTargetCount, completedTargetCount, runningTargetIndex, currentTarget, currentTargetBackfillRowCount, processedMissingRangeCount, estimatedMissingRangeCount, targetStartAt, targetEndAt, targets, createdAt, attemptCount, maxAttempts, nextRetryAt, lastErrorCode, deadLetterReason]
      properties:
        id:
          type: integer
          format: int64
        status:
          type: string
          enum: [planned, pending, leased, running, retry_wait, paused, stopped, succeeded, failed, dead_letter, cancelled]
        dataType:
          type: string
        progressPercent:
          $ref: "#/components/schemas/DecimalString"
        estimatedRequestCount:
          type: integer
          description: 백필 계획 생성 시 계산한 예상 업비트 요청 수.
        totalTargetCount:
          type: integer
          description: 백필 작업의 전체 대상 코인 수.
        completedTargetCount:
          type: integer
          description: 백필 작업에서 완료된 대상 코인 수.
        runningTargetIndex:
          type: integer
          nullable: true
          description: 현재 실행 중인 대상 코인의 1부터 시작하는 순번.
        currentTarget:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/Instrument"
          description: 현재 백필 중인 대상 코인.
        currentTargetBackfillRowCount:
          type: integer
          description: 현재 대상 코인에서 이번 백필 실행으로 기록한 row 수.
        processedMissingRangeCount:
          type: integer
          description: 현재 대상 코인에서 처리한 결측 구간 수.
        estimatedMissingRangeCount:
          type: integer
          description: 현재 대상 코인에서 처리해야 하는 전체 결측 구간 수.
        targetStartAt:
          type: string
          format: date-time
        targetEndAt:
          type: string
          format: date-time
        targets:
          type: array
          items:
            $ref: "#/components/schemas/Instrument"
        createdAt:
          type: string
          format: date-time
        attemptCount:
          type: integer
          minimum: 0
          description: 현재까지 임대를 획득한 실행 시도 횟수.
        maxAttempts:
          type: integer
          minimum: 1
          description: 데드레터로 격리하기 전 최대 실행 시도 횟수.
        nextRetryAt:
          type: string
          format: date-time
          nullable: true
          description: 재시도 대기 상태에서 다시 임대할 수 있는 UTC 시각.
        lastErrorCode:
          type: string
          nullable: true
          description: 가장 최근 실패의 안정적인 오류 코드.
        deadLetterReason:
          type: string
          nullable: true
          description: 재시도 예산 소진으로 작업을 격리한 이유.
    NotificationEventsResponse:
      description: 운영 알림 이벤트 목록 응답.
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/NotificationEvent"
    NotificationEvent:
      description: 운영 중 발생한 알림의 심각도, 유형, 제목, 메시지, 처리 상태 항목.
      type: object
      required: [id, severity, eventType, title, message, status, createdAt]
      properties:
        id:
          type: integer
          format: int64
        severity:
          type: string
          enum: [info, warning, error, critical]
        eventType:
          type: string
        title:
          type: string
        message:
          type: string
        status:
          type: string
          enum: [open, acknowledged, resolved]
        createdAt:
          type: string
          format: date-time
