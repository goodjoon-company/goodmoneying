        dataType:
          type: string
          enum: [source_candle, ticker_snapshot, orderbook_summary]
        status:
          type: string
          enum: [normal, warning, incident, backfilling]
        progressPercent:
          $ref: "#/components/schemas/DecimalString"
        lastSuccessfulAt:
          type: string
          format: date-time
