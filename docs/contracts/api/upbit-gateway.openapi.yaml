openapi: 3.1.0
x-websocket:
  path: /v1/websocket
  message_schema: ./upbit-gateway-websocket.schema.json
info:
  title: goodmoneying 업비트 API 게이트웨이
  version: 0.1.0
  description: 카탈로그 기반 비파괴 업비트 API 시험 경계
paths:
  /health:
    get:
      operationId: getGatewayHealth
      responses:
        "200":
          description: 게이트웨이와 카탈로그 준비 상태
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Health"}
  /v1/catalog:
    get:
      operationId: getUpbitCatalog
      responses:
        "200":
          description: 공식 Upbit v1.6.3 REST·WebSocket 기능 카탈로그
          content:
            application/json:
              schema: {$ref: "#/components/schemas/UpbitApiCatalog"}
  /v1/requests:
    post:
      operationId: executeCatalogRequest
      description: endpoint_id 허용 목록과 비파괴 정책을 먼저 판정하고 read·test 기능만 업비트 상향 호출한다.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/GatewayRequest"}
      responses:
        "200":
          description: 업비트 상향 성공 응답
          content:
            application/json:
              schema: {$ref: "#/components/schemas/TraceEnvelope"}
        "201":
          description: 공식 주문 생성 테스트 성공 응답
          content:
            application/json:
              schema: {$ref: "#/components/schemas/TraceEnvelope"}
        "400":
          description: 업비트 상향 요청 오류
          content:
            application/json:
              schema: {$ref: "#/components/schemas/TraceEnvelope"}
        "401":
          description: 업비트 상향 인증 오류
          content:
            application/json:
              schema: {$ref: "#/components/schemas/TraceEnvelope"}
        "403":
          description: 로컬 정책 차단 또는 업비트 상향 403
          content:
            application/json:
              schema:
                anyOf:
                  - {$ref: "#/components/schemas/TraceEnvelope"}
                  - {$ref: "#/components/schemas/ErrorResponse"}
        "404":
          description: 로컬 미등록 endpoint_id 또는 업비트 상향 404
          content:
            application/json:
              schema:
                anyOf:
                  - {$ref: "#/components/schemas/TraceEnvelope"}
                  - {$ref: "#/components/schemas/ErrorResponse"}
        "422":
          description: 로컬 요청 검증 오류 또는 업비트 상향 422
          content:
            application/json:
              schema:
                anyOf:
                  - {$ref: "#/components/schemas/TraceEnvelope"}
                  - {$ref: "#/components/schemas/ErrorResponse"}
        "418":
          description: 업비트 상향 일시 차단 응답
          content:
            application/json:
              schema: {$ref: "#/components/schemas/TraceEnvelope"}
        "429":
          description: 업비트 상향 요청 제한 초과 응답
          content:
            application/json:
              schema: {$ref: "#/components/schemas/TraceEnvelope"}
        "502":
          description: 로컬 상향 프로토콜 오류 또는 업비트 상향 502
          content:
            application/json:
              schema:
                anyOf:
                  - {$ref: "#/components/schemas/TraceEnvelope"}
                  - {$ref: "#/components/schemas/ErrorResponse"}
        "503":
          description: 로컬 인증 설정 오류 또는 업비트 상향 503
          content:
            application/json:
              schema:
                anyOf:
                  - {$ref: "#/components/schemas/TraceEnvelope"}
                  - {$ref: "#/components/schemas/ErrorResponse"}
        "504":
          description: 로컬 상향 호출 시간 초과 또는 업비트 상향 504
          content:
            application/json:
              schema:
                anyOf:
                  - {$ref: "#/components/schemas/TraceEnvelope"}
                  - {$ref: "#/components/schemas/ErrorResponse"}
        "500":
          description: 업비트 상향 서버 내부 오류
          content:
            application/json:
              schema: {$ref: "#/components/schemas/TraceEnvelope"}
        default:
          description: 명시되지 않은 업비트 상향 상태의 마스킹된 추적
          content:
            application/json:
              schema: {$ref: "#/components/schemas/TraceEnvelope"}
components:
  schemas:
    Health:
      type: object
      additionalProperties: false
      required: [status, service, catalog_version]
      properties:
        status: {type: string, const: ok}
        service: {type: string, const: upbit-gateway}
        catalog_version: {type: string, const: 1.6.3}
    RestInventory:
      type: object
      additionalProperties: false
      required: [active_count, deprecated_count, total_count]
      properties:
        active_count: {type: integer, const: 50}
        deprecated_count: {type: integer, const: 1}
        total_count: {type: integer, const: 51}
    CatalogEntry:
      type: object
      additionalProperties: true
      required: [endpoint_id, safety, source_url]
      properties:
        endpoint_id: {type: string, pattern: "^(rest|websocket)\\."}
        safety: {type: string, enum: [read, test, blocked]}
        source_url: {type: string, format: uri, minLength: 1}
    UpbitApiCatalog:
      type: object
      additionalProperties: true
      required:
        - catalog_version
        - verified_at
        - official_baseline
        - rest_inventory
        - rest_endpoints
        - websocket_streams
        - websocket_operations
        - gateway_websocket_operations
      properties:
        catalog_version: {type: string, const: 1.6.3}
        verified_at: {type: string, format: date}
        official_baseline: {type: string, format: uri, minLength: 1}
        rest_inventory: {$ref: "#/components/schemas/RestInventory"}
        rest_endpoints:
          type: array
          minItems: 51
          maxItems: 51
          items: {$ref: "#/components/schemas/CatalogEntry"}
        websocket_streams:
          type: array
          minItems: 14
          maxItems: 14
          items: {$ref: "#/components/schemas/CatalogEntry"}
        websocket_operations:
          type: array
          minItems: 1
          maxItems: 1
          items: {$ref: "#/components/schemas/CatalogEntry"}
        gateway_websocket_operations:
          type: array
          items:
            type: string
            enum: [connect, subscribe, pause, unsubscribe, reconnect, list]
    GatewayRequest:
      type: object
      additionalProperties: false
      required: [endpoint_id, parameters]
      properties:
        endpoint_id:
          type: string
          pattern: "^rest\\."
        parameters:
          type: object
          additionalProperties: true
    TraceRequest:
      type: object
      additionalProperties: false
      required: [method, path, parameters]
      properties:
        method: {type: string}
        path: {type: string}
        parameters: {type: object, additionalProperties: true}
    TraceResponse:
      type: object
      additionalProperties: false
      required: [status_code, body]
      properties:
        status_code: {type: integer}
        body: {}
    TraceRateLimit:
      type: object
      additionalProperties: false
      required: [group, remaining_sec, retry_after]
      properties:
        group: {type: string}
        remaining_sec:
          anyOf:
            - {type: integer}
            - {type: "null"}
        retry_after:
          anyOf:
            - {type: string}
            - {type: "null"}
    TraceEnvelope:
      type: object
      additionalProperties: false
      required: [trace_id, endpoint_id, request, response, rate_limit, duration_ms, received_at]
      properties:
        trace_id: {type: string, format: uuid}
        endpoint_id: {type: string}
        request: {$ref: "#/components/schemas/TraceRequest"}
        response: {$ref: "#/components/schemas/TraceResponse"}
        rate_limit: {$ref: "#/components/schemas/TraceRateLimit"}
        duration_ms: {type: number, minimum: 0}
        received_at: {type: string, format: date-time}
    ErrorDetail:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code: {type: string}
        message: {type: string}
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [detail]
      properties:
        detail: {$ref: "#/components/schemas/ErrorDetail"}
